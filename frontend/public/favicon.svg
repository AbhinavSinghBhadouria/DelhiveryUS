<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#1a1a2e"/>

  <!-- Delivery truck body -->
  <rect x="6" y="22" width="34" height="22" rx="3" fill="#6366f1"/>

  <!-- Truck cab -->
  <path d="M40 30 L40 44 L58 44 L58 36 L52 30 Z" fill="#4f46e5"/>

  <!-- Cab window -->
  <path d="M42 31.5 L42 37 L54 37 L54 36.5 L50 31.5 Z" fill="#a5b4fc" opacity="0.9"/>

  <!-- Truck roof line connector -->
  <rect x="38" y="22" width="3" height="8" rx="1" fill="#6366f1"/>

  <!-- Wheels -->
  <circle cx="16" cy="46" r="5" fill="#1a1a2e" stroke="#818cf8" stroke-width="2"/>
  <circle cx="16" cy="46" r="2" fill="#818cf8"/>
  <circle cx="48" cy="46" r="5" fill="#1a1a2e" stroke="#818cf8" stroke-width="2"/>
  <circle cx="48" cy="46" r="2" fill="#818cf8"/>

  <!-- Ground line -->
  <rect x="4" y="51" width="56" height="2" rx="1" fill="#2d2d4e"/>

  <!-- Speed lines on truck body -->
  <rect x="10" y="29" width="18" height="2" rx="1" fill="white" opacity="0.25"/>
  <rect x="10" y="33" width="24" height="2" rx="1" fill="white" opacity="0.15"/>

  <!-- Package on truck (small box icon) -->
  <rect x="14" y="26" width="10" height="8" rx="1.5" fill="white" opacity="0.9"/>
  <line x1="19" y1="26" x2="19" y2="34" stroke="#6366f1" stroke-width="1"/>
  <line x1="14" y1="30" x2="24" y2="30" stroke="#6366f1" stroke-width="1"/>
</svg>